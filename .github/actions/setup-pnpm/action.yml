name: Setup pnpm and install
description: Install pnpm (version from package.json), set up Node, restore pnpm store cache, install deps

runs:
  using: composite
  steps:
    - name: Set up pnpm
      uses: pnpm/action-setup@v6

    - name: Set up Node
      uses: actions/setup-node@v6
      with:
        node-version: '24'
        cache: pnpm

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile
