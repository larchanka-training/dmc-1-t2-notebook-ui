openapi: 3.1.0
info:
  title: Auth API
  version: 0.1.0
  description: Demo auth API for PoC of API client generation.

servers:
  - url: http://localhost:3000/api
    description: Local dev

security:
  - bearerAuth: []

paths:
  /auth/login:
    post:
      operationId: login
      summary: Exchange credentials for a session token
      tags: [auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '400':
          $ref: '#/components/responses/BadRequest'

  /auth/logout:
    post:
      operationId: logout
      summary: Invalidate the current session
      tags: [auth]
      security:
        - bearerAuth: []
      responses:
        '204':
          description: No Content
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/me:
    get:
      operationId: getMe
      summary: Current authenticated user
      tags: [auth]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          examples: ['user@example.com']
        password:
          type: string
          format: password
          minLength: 6

    LoginResponse:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
          description: 'JWT bearer token. Send as `Authorization: Bearer <token>`.'
        user:
          $ref: '#/components/schemas/User'

    User:
      type: object
      required: [id, email]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        displayName:
          type: string

    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          description: Machine-readable error code (e.g. `invalid_credentials`).
        message:
          type: string
          description: Human-readable error description.

  responses:
    Unauthorized:
      description: Missing or invalid credentials
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    BadRequest:
      description: Malformed request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
