openapi: 3.1.0
info:
  title: Auth API
  version: 1.0.0
  description: Authentication API — email OTP + JWT access/refresh tokens.

servers:
  - url: http://localhost:3000/api/v1
    description: Local dev

security:
  - bearerAuth: []

paths:
  /auth/otp/request:
    post:
      operationId: requestOtp
      summary: Request a one-time password for the given email
      tags: [auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OtpRequest'
      responses:
        '200':
          description: >
            OTP returned in response body (dev/local/test only).
            Production always returns 204 — OTP is sent by email.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OtpRequestDevResponse'
        '204':
          description: No Content — OTP sent by email (production).
        '400':
          $ref: '#/components/responses/BadRequest'
        '422':
          $ref: '#/components/responses/ValidationError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

  /auth/otp/verify:
    post:
      operationId: verifyOtp
      summary: Verify the one-time password and issue access + refresh tokens
      tags: [auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OtpVerifyRequest'
      responses:
        '200':
          description: OK — session created, tokens issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OtpVerifyResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'

  /auth/refresh:
    post:
      operationId: refreshTokens
      summary: Rotate the refresh token and issue a new access token
      tags: [auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: OK — tokens rotated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'

  /auth/logout:
    post:
      operationId: logout
      summary: Revoke the current session
      description: >
        Idempotent — always returns 204 regardless of token state.
        Authorization via refreshToken in the request body (not Bearer).
      tags: [auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
      responses:
        '204':
          description: No Content — session revoked (idempotent)
        '422':
          $ref: '#/components/responses/ValidationError'

  /auth/me:
    get:
      operationId: getMe
      summary: Return the current authenticated user
      tags: [auth]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    OtpRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          examples: ['user@example.com']

    OtpRequestDevResponse:
      type: object
      required: [otp, expiresAt]
      description: Returned only in dev/local/test. Never present in production.
      properties:
        otp:
          type: string
          description: One-time password value.
          examples: ['123456']
        expiresAt:
          type: integer
          format: int64
          description: Unix timestamp in milliseconds when the OTP expires.

    OtpVerifyRequest:
      type: object
      required: [email, otp]
      properties:
        email:
          type: string
        otp:
          type: string
          minLength: 6
          maxLength: 6

    OtpVerifyResponse:
      type: object
      required: [accessToken, refreshToken, user]
      properties:
        accessToken:
          type: string
          description: 'Short-lived JWT (15 min). Send as `Authorization: Bearer <token>`.'
        refreshToken:
          type: string
          description: 'Opaque token (30 days). Use only in POST /auth/refresh and POST /auth/logout.'
        user:
          $ref: '#/components/schemas/User'

    RefreshRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string

    RefreshResponse:
      type: object
      required: [accessToken, refreshToken]
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string

    LogoutRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string

    User:
      type: object
      required: [id]
      properties:
        id:
          type: string
          format: uuid
        email:
          oneOf:
            - type: string
            - type: 'null'
        displayName:
          type: [string, 'null']
        roles:
          type: array
          items:
            type: string
          default: []

    ApiError:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          description: Machine-readable error code (e.g. `invalid_otp`).
        message:
          type: string
          description: Human-readable error description.
        fields:
          type: object
          additionalProperties:
            type: string
          description: Per-field validation errors (validation errors only).

    ApiErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          $ref: '#/components/schemas/ApiError'

  responses:
    Unauthorized:
      description: Missing or invalid credentials
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
    BadRequest:
      description: Malformed request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
    ServiceUnavailable:
      description: Upstream dependency (e.g. OTP email delivery) is unavailable
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
