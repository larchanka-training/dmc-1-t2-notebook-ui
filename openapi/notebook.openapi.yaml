openapi: 3.1.0
info:
  title: Notebook API
  version: 0.1.0
  description: |
    Demo notebook API for PoC of API client generation.
    Covers list+detail resources, path-parameters, and a polymorphic response
    (cell run result discriminated by `status`).

servers:
  - url: http://localhost:3000/api
    description: Local dev

security:
  - bearerAuth: []

paths:
  /notebooks:
    get:
      operationId: listNotebooks
      summary: List notebooks owned by the current user
      tags: [notebook]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Notebook'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      operationId: createNotebook
      summary: Create a new empty notebook
      tags: [notebook]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateNotebookRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Notebook'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '400':
          $ref: '#/components/responses/BadRequest'

  /notebooks/{notebookId}/cells/{cellId}/run:
    post:
      operationId: runCell
      summary: Execute a single cell and return its result
      tags: [notebook]
      parameters:
        - $ref: '#/components/parameters/NotebookId'
        - $ref: '#/components/parameters/CellId'
      responses:
        '200':
          description: Run result. Shape depends on `status`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CellRunResult'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    NotebookId:
      name: notebookId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    CellId:
      name: cellId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  schemas:
    Notebook:
      type: object
      required: [id, title, createdAt, cells]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        createdAt:
          type: string
          format: date-time
        cells:
          type: array
          items:
            $ref: '#/components/schemas/Cell'

    Cell:
      type: object
      required: [id, code, status]
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
        status:
          $ref: '#/components/schemas/CellStatus'
        output:
          type: string

    CellStatus:
      type: string
      enum: [idle, running, done, error]

    CreateNotebookRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200

    CellRunResult:
      oneOf:
        - $ref: '#/components/schemas/CellRunRunning'
        - $ref: '#/components/schemas/CellRunDone'
        - $ref: '#/components/schemas/CellRunError'
      discriminator:
        propertyName: status
        mapping:
          running: '#/components/schemas/CellRunRunning'
          done: '#/components/schemas/CellRunDone'
          error: '#/components/schemas/CellRunError'

    CellRunRunning:
      type: object
      required: [status, startedAt]
      properties:
        status:
          type: string
          const: running
        startedAt:
          type: string
          format: date-time

    CellRunDone:
      type: object
      required: [status, output, durationMs]
      properties:
        status:
          type: string
          const: done
        output:
          type: string
        durationMs:
          type: integer
          minimum: 0

    CellRunError:
      type: object
      required: [status, error]
      properties:
        status:
          type: string
          const: error
        error:
          type: string

    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string

  responses:
    Unauthorized:
      description: Missing or invalid credentials
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    BadRequest:
      description: Malformed request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Notebook or cell not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
